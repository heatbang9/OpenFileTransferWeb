<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OpenFileTransfer Web MVP는 설치 없이 WebRTC로 브라우저 간 파일을 직접 전송합니다."
    />
    <title>OpenFileTransfer Web</title>
    <meta name="theme-color" content="#176A63" />
    <link rel="icon" href="/assets/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-icon" src="/assets/icon.svg" alt="" />
          <div>
            <h1>OpenFileTransfer Web</h1>
            <p id="connectionSummary">대기 중</p>
          </div>
        </div>
        <div class="status-pill" id="connectionState">오프라인</div>
      </header>

      <section class="layout">
        <aside class="side-panel">
          <label class="field-label" for="deviceName">디바이스 이름</label>
          <div class="name-row">
            <input id="deviceName" autocomplete="off" maxlength="32" />
            <button class="icon-button" id="saveDeviceName" title="이름 저장" aria-label="이름 저장">✓</button>
          </div>

          <div class="device-card">
            <span class="muted-label">내 UUID</span>
            <code id="deviceId"></code>
          </div>

          <label class="field-label spaced" for="passphrase">전송 암호</label>
          <input id="passphrase" type="password" autocomplete="new-password" placeholder="선택 사항" />

          <label class="toggle-row" for="streamSave">
            <input id="streamSave" type="checkbox" />
            <span>수신 파일 바로 저장</span>
          </label>

          <section class="turn-panel" aria-labelledby="turnTitle">
            <div class="box-heading">
              <span id="turnTitle">TURN 설정</span>
              <span class="button-cluster">
                <button class="text-button" id="testTurn" type="button">테스트</button>
                <button class="text-button" id="saveTurn" type="button">저장</button>
              </span>
            </div>
            <input id="turnUrl" autocomplete="off" placeholder="turn:host:3478" />
            <input id="turnUsername" autocomplete="off" placeholder="username" />
            <input id="turnCredential" type="password" autocomplete="new-password" placeholder="credential" />
            <div class="nearby-status" id="turnStatus">기본 STUN 사용 중</div>
          </section>

          <div class="mode-switch" role="tablist" aria-label="전송 모드">
            <button class="mode-button active" id="senderMode" type="button">보내기</button>
            <button class="mode-button" id="receiverMode" type="button">받기</button>
          </div>

          <section class="nearby-panel" aria-labelledby="nearbyTitle">
            <div class="box-heading">
              <span id="nearbyTitle">Nearby 방</span>
              <button class="text-button" id="randomRoom" type="button">랜덤</button>
            </div>
            <div class="room-row">
              <input id="roomCode" autocomplete="off" maxlength="32" placeholder="room-code" />
              <button class="icon-button" id="joinRoom" title="방 참여" aria-label="방 참여">↗</button>
            </div>
            <div class="nearby-status" id="nearbyStatus">방에 참여하지 않음</div>
            <ul class="device-list" id="nearbyDevices" aria-live="polite"></ul>
          </section>

          <button class="secondary-button" id="resetConnection" type="button">연결 초기화</button>
        </aside>

        <section class="work-panel">
          <section class="role-card active" id="senderPanel" aria-labelledby="senderTitle">
            <div class="panel-heading">
              <div>
                <span class="muted-label">Sender</span>
                <h2 id="senderTitle">파일 보내기</h2>
              </div>
              <span class="mini-badge" id="senderReady">준비 전</span>
            </div>

            <label class="drop-zone" for="fileInput" id="dropZone">
              <input id="fileInput" type="file" multiple />
              <span class="drop-icon">⇄</span>
              <strong id="fileName">파일 선택 또는 드롭</strong>
              <small id="fileSize">선택된 파일 0개</small>
            </label>

            <ul class="file-list" id="selectedFiles" aria-live="polite"></ul>

            <div class="signal-grid">
              <div class="signal-box">
                <div class="box-heading">
                  <span>초대 코드</span>
                  <span class="button-cluster">
                    <button class="text-button" id="copyOffer" type="button">복사</button>
                    <button class="text-button" id="shareOffer" type="button">공유</button>
                  </span>
                </div>
                <textarea id="offerCode" readonly spellcheck="false" placeholder="초대 코드를 만들면 여기에 표시됩니다."></textarea>
                <div class="qr-card hidden" id="offerQrCard">
                  <canvas id="offerQr" width="220" height="220" aria-label="초대 링크 QR"></canvas>
                </div>
                <button class="primary-button" id="createOffer" type="button">초대 코드 만들기</button>
              </div>

              <div class="signal-box">
                <div class="box-heading">
                  <span>응답 코드</span>
                  <span class="button-cluster">
                    <button class="text-button" id="pasteAnswer" type="button">붙여넣기</button>
                    <button class="text-button" id="scanAnswer" type="button">스캔</button>
                  </span>
                </div>
                <textarea id="answerInput" spellcheck="false" placeholder="받는 쪽의 응답 코드를 붙여넣으세요."></textarea>
                <button class="primary-button" id="acceptAnswer" type="button">응답 코드 연결</button>
              </div>
            </div>

            <div class="action-row">
              <button class="send-button" id="sendFile" type="button" disabled>선택 파일 전송</button>
              <button class="secondary-button inline-button" id="retryTransfer" type="button" disabled>재시도</button>
              <button class="danger-button" id="cancelTransfer" type="button" disabled>중지</button>
            </div>
          </section>

          <section class="role-card" id="receiverPanel" aria-labelledby="receiverTitle">
            <div class="panel-heading">
              <div>
                <span class="muted-label">Receiver</span>
                <h2 id="receiverTitle">파일 받기</h2>
              </div>
              <span class="mini-badge" id="receiverReady">준비 전</span>
            </div>

            <div class="signal-grid single">
              <div class="signal-box">
                <div class="box-heading">
                  <span>초대 코드</span>
                  <span class="button-cluster">
                    <button class="text-button" id="pasteOffer" type="button">붙여넣기</button>
                    <button class="text-button" id="scanOffer" type="button">스캔</button>
                  </span>
                </div>
                <textarea id="offerInput" spellcheck="false" placeholder="보내는 쪽의 초대 코드를 붙여넣으세요."></textarea>
                <button class="primary-button" id="createAnswer" type="button">응답 코드 만들기</button>
              </div>

              <div class="signal-box">
                <div class="box-heading">
                  <span>응답 코드</span>
                  <span class="button-cluster">
                    <button class="text-button" id="copyAnswer" type="button">복사</button>
                    <button class="text-button" id="shareAnswer" type="button">공유</button>
                  </span>
                </div>
                <textarea id="answerCode" readonly spellcheck="false" placeholder="응답 코드를 만들면 여기에 표시됩니다."></textarea>
                <div class="qr-card hidden" id="answerQrCard">
                  <canvas id="answerQr" width="220" height="220" aria-label="응답 코드 QR"></canvas>
                </div>
              </div>
            </div>

            <section class="received-panel">
              <div class="box-heading">
                <span>받은 파일</span>
                <button class="text-button" id="clearReceived" type="button">비우기</button>
              </div>
              <ul class="file-list downloads" id="receivedFiles" aria-live="polite"></ul>
            </section>
          </section>

          <section class="transfer-panel">
            <div class="panel-heading compact">
              <div>
                <span class="muted-label">Transfer</span>
                <h2>진행 상태</h2>
              </div>
              <span id="transferPercent">0%</span>
            </div>
            <div class="progress-track" aria-label="전송 진행률">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <ol class="event-list" id="eventList" aria-live="polite"></ol>
            <section class="history-panel">
              <div class="box-heading">
                <span>전송 이력</span>
                <button class="text-button" id="clearHistory" type="button">비우기</button>
              </div>
              <ul class="history-list" id="historyList" aria-live="polite"></ul>
            </section>
          </section>
        </section>
      </section>
    </main>

    <dialog class="scan-dialog" id="scanDialog">
      <div class="box-heading">
        <span>QR 스캔</span>
        <button class="text-button" id="closeScanner" type="button">닫기</button>
      </div>
      <video id="scanVideo" autoplay muted playsinline></video>
    </dialog>

    <script src="/vendor/qr-creator.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
