name: CI

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check
      - run: python3 -m http.server 4173 &
      - run: |
          sleep 1
          curl --fail http://localhost:4173/
          curl --fail http://localhost:4173/app.js
          curl --fail http://localhost:4173/styles.css
          curl --fail http://localhost:4173/assets/icon.svg
          curl --fail http://localhost:4173/vendor/qr-creator.min.js
